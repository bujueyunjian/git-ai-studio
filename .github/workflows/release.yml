name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSI
            os: windows-2022
            artifact: windows
            tauri_args: --bundles msi
          - name: macOS Universal
            os: macos-14
            artifact: macos
            tauri_args: --target universal-apple-darwin --bundles app,dmg
          - name: Linux x86_64
            os: ubuntu-22.04
            artifact: linux-x86_64
            tauri_args: --bundles deb,appimage
          - name: Linux ARM64
            os: ubuntu-22.04-arm
            artifact: linux-arm64
            tauri_args: --bundles deb,appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            wget \
            xdg-utils

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundles
        env:
          # Minisign keypair for tauri-plugin-updater signature verification (ADR-006).
          # If unset (e.g. fork without secrets), tauri-action skips signing — release still ships,
          # but the in-app updater will refuse the download until the secret is provisioned.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build ${{ matrix.tauri_args }}

      - name: Collect Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $version = $env:GITHUB_REF_NAME
          if (-not $version) { $version = "manual" }
          $msi = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Filter *.msi | Select-Object -First 1
          if ($null -eq $msi) { throw "Windows MSI not found" }
          Copy-Item $msi.FullName "release-assets/Git-AI-Studio-$version-Windows-x86_64.msi"
          # Updater signature (optional — only present if TAURI_SIGNING_PRIVATE_KEY is set)
          $sig = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Filter *.msi.sig -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $sig) {
            Copy-Item $sig.FullName "release-assets/Git-AI-Studio-$version-Windows-x86_64.msi.sig"
          }

      - name: Collect macOS installer
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          version="${GITHUB_REF_NAME:-manual}"
          dmg="$(find src-tauri/target -path '*bundle/dmg/*.dmg' -type f | head -1 || true)"
          if [ -z "$dmg" ]; then
            echo "macOS DMG not found" >&2
            exit 1
          fi
          cp "$dmg" "release-assets/Git-AI-Studio-${version}-macOS-universal.dmg"
          # Updater payload: tauri-action produces .app.tar.gz from --bundles app
          app_tgz="$(find src-tauri/target -path '*bundle/macos/*.app.tar.gz' -type f | head -1 || true)"
          if [ -n "$app_tgz" ]; then
            cp "$app_tgz" "release-assets/Git-AI-Studio-${version}-macOS-universal.app.tar.gz"
            sig="${app_tgz}.sig"
            if [ -f "$sig" ]; then
              cp "$sig" "release-assets/Git-AI-Studio-${version}-macOS-universal.app.tar.gz.sig"
            fi
          fi

      - name: Collect Linux installers
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          version="${GITHUB_REF_NAME:-manual}"
          # Arch suffix derived from matrix.artifact (linux-x86_64 / linux-arm64) → x86_64 / aarch64
          case "${{ matrix.artifact }}" in
            linux-arm64) arch_label="aarch64" ;;
            linux-x86_64|*) arch_label="x86_64" ;;
          esac
          deb="$(find src-tauri/target -path '*bundle/deb/*.deb' -type f | head -1 || true)"
          appimage="$(find src-tauri/target -path '*bundle/appimage/*.AppImage' -type f | head -1 || true)"
          if [ -z "$deb" ]; then
            echo "Linux deb not found" >&2
            exit 1
          fi
          if [ -z "$appimage" ]; then
            echo "Linux AppImage not found" >&2
            exit 1
          fi
          cp "$deb" "release-assets/Git-AI-Studio-${version}-Linux-${arch_label}.deb"
          cp "$appimage" "release-assets/Git-AI-Studio-${version}-Linux-${arch_label}.AppImage"
          # Updater signature for AppImage (optional)
          sig="${appimage}.sig"
          if [ -f "$sig" ]; then
            cp "$sig" "release-assets/Git-AI-Studio-${version}-Linux-${arch_label}.AppImage.sig"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -la release-assets

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Git AI Studio ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  assemble-latest-json:
    name: Assemble latest.json
    runs-on: ubuntu-22.04
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Prepare GH
        run: |
          gh --version || (type -p curl >/dev/null && sudo apt-get update && sudo apt-get install -y gh || true)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dl
          gh release download "$TAG" --dir dl --repo "$GITHUB_REPOSITORY"
          ls -la dl || true
      - name: Generate latest.json
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          base_url="https://github.com/$REPO/releases/download/$TAG"
          # 初始化空平台映射
          mac_url=""; mac_sig=""
          win_url=""; win_sig=""
          linux_x64_url=""; linux_x64_sig=""
          linux_arm64_url=""; linux_arm64_sig=""
          shopt -s nullglob
          for sig in dl/*.sig; do
            base=${sig%.sig}
            fname=$(basename "$base")
            url="$base_url/$fname"
            sig_content=$(cat "$sig")
            case "$fname" in
              *-macOS-universal.app.tar.gz)
                # macOS universal updater artifact
                mac_url="$url"; mac_sig="$sig_content";;
              *-Linux-aarch64.AppImage|*-Linux-aarch64.appimage)
                linux_arm64_url="$url"; linux_arm64_sig="$sig_content";;
              *-Linux-x86_64.AppImage|*-Linux-x86_64.appimage)
                linux_x64_url="$url"; linux_x64_sig="$sig_content";;
              *-Windows-x86_64.msi)
                win_url="$url"; win_sig="$sig_content";;
            esac
          done
          # 构造 JSON(仅包含存在的目标)
          tmp_json=$(mktemp)
          {
            echo '{'
            echo "  \"version\": \"$VERSION\",";
            echo "  \"notes\": \"Release $TAG\",";
            echo "  \"pub_date\": \"$PUB_DATE\",";
            echo '  "platforms": {'
            first=1
            if [ -n "$mac_url" ] && [ -n "$mac_sig" ]; then
              # universal 包同时映射 arm64 / x64 两个键,双写指向同一 .app.tar.gz
              for key in darwin-aarch64 darwin-x86_64; do
                [ $first -eq 0 ] && echo ','
                echo "    \"$key\": {\"signature\": \"$mac_sig\", \"url\": \"$mac_url\"}"
                first=0
              done
            fi
            if [ -n "$win_url" ] && [ -n "$win_sig" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"windows-x86_64\": {\"signature\": \"$win_sig\", \"url\": \"$win_url\"}"
              first=0
            fi
            if [ -n "$linux_x64_url" ] && [ -n "$linux_x64_sig" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"linux-x86_64\": {\"signature\": \"$linux_x64_sig\", \"url\": \"$linux_x64_url\"}"
              first=0
            fi
            if [ -n "$linux_arm64_url" ] && [ -n "$linux_arm64_sig" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"linux-aarch64\": {\"signature\": \"$linux_arm64_sig\", \"url\": \"$linux_arm64_url\"}"
              first=0
            fi
            echo '  }'
            echo '}'
          } > "$tmp_json"
          echo "Generated latest.json:" && cat "$tmp_json"
          mv "$tmp_json" latest.json
      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          gh release upload "$GITHUB_REF_NAME" latest.json --clobber --repo "$GITHUB_REPOSITORY"
